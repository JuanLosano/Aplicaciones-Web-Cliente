<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">

    <link rel="stylesheet" href="/css/estilos.css">

    <script src="js/menu.js" defer></script>
    <script src="js/main.js" defer></script>

    <title>Detalle del Libro</title>
</head>

<body>

<header>
    <div class="contenedor-header">
        <h1>Libros Stores</h1>

        <div class="controles">

            <button class="fav-btn" aria-label="Agregar a favoritos" aria-controls="primary-fav">
                <span class="sr-only">Mis favoritos</span>
                <span id="fav-count" class="fav-count"></span>
            </button>

            <aside class="mis-favoritos primary-fav" data-visible="false">
                <h1>
                    Mis Favoritos
                    <button class="fav-btn-cerrar">
                        <span class="sr-only">Cerrar ventana</span>
                    </button>
                </h1>

                <ul class="lista-favoritos"></ul>
            </aside>

            <button class="cart-btn" aria-label="Ver carrito" aria-controls="primary-cart">
                <span class="sr-only">Mi carrito</span>
                <span id="cart-count" class="cart-count"></span>
            </button>

            <aside class="mi-carrito primary-cart" id="primary-cart" data-visible="false">
                <h1>
                    Mi Carrito
                    <button class="cart-btn-cerrar">
                        <span class="sr-only">Cerrar ventana</span>
                    </button>
                </h1>

                <ul class="lista-carrito"></ul>

                <h2 class="cart-total total"></h2>

                <button class="checkout">
                    Finalizar Compra
                </button>
            </aside>

            <button class="menu-btn" aria-label="Menú" aria-controls="primary-navigation">
                <span class="sr-only">Menú principal</span>
            </button>

            <nav id="primary-navigation" class="primary-navigation" data-visible="false">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./nosotros.html">Nosotros</a></li>
                </ul>
            </nav>

        </div>
    </div>
</header>

<main>

    <section>

        <!-- Se completa desde JavaScript -->
        <article class="detalle-producto"></article>

        <hr class="separador">

        <!-- Se completa desde JavaScript -->
        <article class="descripcion_producto"></article>

        <hr class="separador">

        <!-- Se completa desde JavaScript -->
        <article class="especificaciones_producto"></article>

    </section>

</main>

<footer>
    <nav>
        <h2>Sobre Nosotros</h2>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="./producto.html">Productos</a></li>
            <li><a href="./nosotros.html">Nosotros</a></li>
        </ul>
    </nav>

    <nav>
        <h2>Seguinos en:</h2>
        <ul>
            <li><a href="#">Facebook</a></li>
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Instagram</a></li>
        </ul>
    </nav>

    <a href="https://wa.me/5491161698241"
       target="_blank"
       rel="noopener noreferrer"
       class="contacto">
        <span class="sr-only">Contactanos a través de WhatsApp</span>
    </a>
</footer>

</body>
</html>
